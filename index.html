<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>누수 기술 소견서</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net"/>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Pretendard, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }

    /* ── Print: show ONLY the A4 document at full page ── */
    @media print {
      @page { size: A4; margin: 14mm; }
      html, body {
        background: #fff !important;
        margin: 0 !important; padding: 0 !important;
        width: 100% !important; height: auto !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      /* Hide everything */
      body * { visibility: hidden !important; }
      /* Show only the A4 paper */
      .a4-paper, .a4-paper * { visibility: visible !important; }
      /* Strip ALL ancestor containers so nothing constrains the paper */
      #root, #root > div, #root > div > main,
      .preview-card-outer, .preview-scaler {
        display: block !important;
        overflow: visible !important;
        width: auto !important; max-width: none !important;
        height: auto !important; min-height: 0 !important;
        padding: 0 !important; margin: 0 !important;
        border: none !important; box-shadow: none !important;
        border-radius: 0 !important;
        transform: none !important;
        background: none !important;
        flex: unset !important;
      }
      /* Also strip any intermediate divs */
      #root > div > main > div,
      .preview-card-outer > div,
      .preview-scaler > div {
        display: block !important;
        overflow: visible !important;
        width: auto !important; padding: 0 !important;
        margin: 0 !important; border: none !important;
        box-shadow: none !important; border-radius: 0 !important;
        transform: none !important; background: none !important;
      }
      .no-print { display: none !important; }
      .a4-paper {
        position: relative !important;
        width: 100% !important;
        min-height: auto !important;
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        transform: none !important;
        overflow: visible !important;
        background: #fff !important;
      }
      .a4-inner { padding: 0 !important; }
      .print-bg { background: #f3f4f6 !important; }
    }

    /* Macro dropdown */
    .macro-dropdown {
      position: absolute;
      z-index: 50;
      background: #1a2236;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
      max-height: 220px;
      overflow-y: auto;
      min-width: 280px;
    }
    .macro-dropdown-item {
      padding: 10px 14px;
      font-size: 13px;
      color: rgba(255,255,255,.85);
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,.06);
      transition: background .1s;
    }
    .macro-dropdown-item:last-child { border-bottom: none; }
    .macro-dropdown-item:hover, .macro-dropdown-item.active {
      background: rgba(96,165,250,.18);
    }
    .macro-dropdown-item .hint {
      font-size: 10px;
      color: rgba(255,255,255,.4);
      margin-top: 2px;
    }
  </style>
</head>
<body class="bg-[#0c1222] text-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    /* ─── Constants ─── */
    const STORAGE_DATA = 'sogyeonse_data_v5';
    const STORAGE_LOGO = 'sogyeonse_logo_v5';
    const STORAGE_STAMP = 'sogyeonse_stamp_v5';
    const STORAGE_SCALE = 'sogyeonse_scale_v5';
    const STORAGE_TEMPLATES = 'sogyeonse_templates_v5';
    const STORAGE_COMPANY = 'sogyeonse_company_v5';
    const STORAGE_MACROS = 'sogyeonse_macros_v5';

    const DEFAULT_SPECIAL_NOTE = '본 소견서는 방문 일자로부터 14일간의 세대내 누수 원인을 입증하는데 유효합니다. 공용부위나 복합누수 원인에 경우 모든 내용을 기입하지 않을 수 있습니다.';

    const EMPTY = {
      managerName:'', email:'', visitDate:'', managerPhone:'',
      siteAddress:'', leakCause:'', workItems:'', detailFinding:'', note:'',
      specialNote: DEFAULT_SPECIAL_NOTE
    };

    const EMPTY_COMPANY = {
      companyName:'0원누수', registrationNumber:'858-18-02343',
      representative:'최혁진',
      companyAddress:'부산광역시 해운대구 대천로67번길 12, 4층 401-80A',
      businessType:'건설업 / 배관 및 냉·난방 공사업',
      phone:'1555-6482',
      logoUrl:'', stampUrl:''
    };

    /* ─── File helpers: download / fetch JSON ─── */
    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
    function uploadJSON(accept) {
      return new Promise((resolve) => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = accept || '.json';
        input.onchange = () => {
          const file = input.files?.[0];
          if (!file) { resolve(null); return; }
          const reader = new FileReader();
          reader.onload = () => { try { resolve(JSON.parse(reader.result)); } catch { alert('올바른 JSON 파일이 아닙니다.'); resolve(null); } };
          reader.readAsText(file);
        };
        input.click();
      });
    }
    async function fetchJSON(url, fallback) {
      try { const r = await fetch(url); if (!r.ok) return fallback; return await r.json(); }
      catch { return fallback; }
    }

    /* ─── Supabase client ─── */
    const sb = (typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL && !SUPABASE_URL.includes('YOUR_'))
      ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    /* ─── DB helpers: snake_case ↔ camelCase ─── */
    const toSnake = (obj) => {
      const map = { companyName:'company_name', registrationNumber:'registration_number', representative:'representative',
        companyAddress:'company_address', businessType:'business_type', phone:'phone', logoUrl:'logo_url', stampUrl:'stamp_url',
        managerName:'manager_name', email:'email', visitDate:'visit_date', managerPhone:'manager_phone',
        siteAddress:'site_address', leakCause:'leak_cause', workItems:'work_items', detailFinding:'detail_finding',
        note:'note', specialNote:'special_note', title:'title' };
      const out = {};
      for (const [k, v] of Object.entries(obj)) { out[map[k] || k] = v; }
      return out;
    };
    const toCamel = (obj) => {
      const map = { company_name:'companyName', registration_number:'registrationNumber', representative:'representative',
        company_address:'companyAddress', business_type:'businessType', phone:'phone', logo_url:'logoUrl', stamp_url:'stampUrl',
        manager_name:'managerName', email:'email', visit_date:'visitDate', manager_phone:'managerPhone',
        site_address:'siteAddress', leak_cause:'leakCause', work_items:'workItems', detail_finding:'detailFinding',
        note:'note', special_note:'specialNote', title:'title' };
      const out = {};
      for (const [k, v] of Object.entries(obj)) { out[map[k] || k] = v; }
      return out;
    };

    /* DB: Company */
    const dbCompany = {
      async load() {
        if (!sb) return null;
        const { data } = await sb.from('company').select('*').eq('id', 1).single();
        return data ? toCamel(data) : null;
      },
      async save(company) {
        if (!sb) return;
        const row = toSnake(company);
        delete row.id;
        row.updated_at = new Date().toISOString();
        await sb.from('company').update(row).eq('id', 1);
      }
    };

    /* DB: Documents */
    const dbDocs = {
      async list() {
        if (!sb) return [];
        const { data } = await sb.from('documents').select('id, title, site_address, manager_name, visit_date, updated_at').order('updated_at', { ascending: false });
        return (data || []).map(r => ({ ...toCamel(r), id: r.id, updatedAt: r.updated_at }));
      },
      async load(id) {
        if (!sb) return null;
        const { data } = await sb.from('documents').select('*').eq('id', id).single();
        return data ? { id: data.id, ...toCamel(data) } : null;
      },
      async save(id, doc) {
        if (!sb) return null;
        const row = toSnake(doc);
        delete row.id; delete row.created_at; delete row.updated_at; delete row.updatedAt;
        row.updated_at = new Date().toISOString();
        if (id) {
          await sb.from('documents').update(row).eq('id', id);
          return id;
        } else {
          const { data } = await sb.from('documents').insert(row).select('id').single();
          return data?.id || null;
        }
      },
      async remove(id) {
        if (!sb) return;
        await sb.from('documents').delete().eq('id', id);
      }
    };

    /* DB: Templates */
    const dbTemplates = {
      async list() {
        if (!sb) return [];
        const { data } = await sb.from('templates').select('*').order('created_at', { ascending: false });
        return (data || []).map(r => ({ id: r.id, name: r.name, data: r.data, createdAt: r.created_at }));
      },
      async save(name, tplData) {
        if (!sb) return;
        await sb.from('templates').insert({ name, data: tplData });
      },
      async remove(id) {
        if (!sb) return;
        await sb.from('templates').delete().eq('id', id);
      }
    };

    const DEFAULT_MACROS = {
      leakCause: [
        '배관 접합부 누수로 추정됨',
        '방수층 손상으로 인한 누수로 추정됨',
        '우수관/배수관 막힘으로 역류 흔적 확인',
        '결로(단열 미흡) 가능성 있음',
        '원인 미상(추가 탐지 필요)',
      ],
      workItems: [
        '누수 탐지',
        '부분 철거 및 노출',
        '배관 보수/교체',
        '방수 보강',
        '복구(미장/도배/타일 등)',
      ],
      detailFinding: [
        '현장 확인 결과 누수 흔적(변색/곰팡이/박리) 확인됨.',
        '열화상/청음/가압 테스트 결과 특정 구간에서 이상 반응 확인됨.',
        '추가 피해 방지를 위해 조속한 보수 공사 권고함.',
        '공사 범위는 현장 상황에 따라 변동될 수 있음.',
      ],
    };

    /* ─── Helpers ─── */
    function loadJSON(key, fallback) {
      try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }
      catch { return fallback; }
    }
    function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    /* ─── Shared input class ─── */
    const INPUT_CLS = "w-full bg-white/[.08] border border-white/[.15] rounded-xl px-3.5 py-2.5 text-sm text-white/90 placeholder:text-white/30 outline-none focus:border-blue-400/70 focus:ring-2 focus:ring-blue-400/20 focus:bg-white/[.10] transition-all";

    /* ─── SmartTextarea: IME-safe textarea with # macro trigger (Notion-style) ─── */
    function SmartTextarea({ value, onChange, placeholder, name, macros }) {
      const composing = useRef(false);
      const [local, setLocal] = useState(value);
      const [showMacro, setShowMacro] = useState(false);
      const [activeIdx, setActiveIdx] = useState(0);
      const [hashStart, setHashStart] = useState(-1);
      const textareaRef = useRef(null);
      const wrapRef = useRef(null);

      // Sync parent → local (only when not composing)
      useEffect(() => { if (!composing.current) setLocal(value); }, [value]);

      // Compute filter from local text and hash position
      const getFilter = () => {
        if (hashStart < 0 || !textareaRef.current) return '';
        const pos = textareaRef.current.selectionStart;
        return (local || '').substring(hashStart + 1, pos);
      };
      const filterText = showMacro ? getFilter() : '';
      const filtered = macros ? macros.filter(m => !filterText || m.toLowerCase().includes(filterText.toLowerCase())) : [];

      const closeMacro = () => { setShowMacro(false); setHashStart(-1); setActiveIdx(0); };

      const insertMacro = (text) => {
        const ta = textareaRef.current;
        if (!ta) return;
        const cur = local || '';
        const pos = ta.selectionStart;
        const hPos = hashStart >= 0 ? hashStart : pos;
        const before = cur.substring(0, hPos);
        const after = cur.substring(pos);
        const newVal = before + text + after;
        setLocal(newVal);
        onChange(newVal);
        closeMacro();
        setTimeout(() => { ta.focus(); ta.setSelectionRange(before.length + text.length, before.length + text.length); }, 20);
      };

      const handleKeyDown = (e) => {
        if (!showMacro || filtered.length === 0) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, filtered.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
        else if (e.key === 'Enter') { e.preventDefault(); insertMacro(filtered[activeIdx]); }
        else if (e.key === 'Escape') { closeMacro(); }
      };

      const handleChange = (e) => {
        const v = e.target.value;
        setLocal(v);
        if (!composing.current) {
          onChange(v);
          // Macro logic (only when not composing)
          const pos = e.target.selectionStart;
          if (macros && macros.length > 0) {
            if (showMacro) {
              if (hashStart >= 0 && hashStart < pos) {
                const seg = v.substring(hashStart, pos);
                if (seg.includes('\n')) { closeMacro(); } else { setActiveIdx(0); }
              } else { closeMacro(); }
            } else {
              if (v[pos - 1] === '#') {
                const cb = pos >= 2 ? v[pos - 2] : null;
                if (!cb || cb === '\n' || cb === ' ') {
                  setShowMacro(true); setActiveIdx(0); setHashStart(pos - 1);
                }
              }
            }
          }
        }
      };

      return (
        <div ref={wrapRef} className="relative">
          <textarea ref={textareaRef} value={local} onChange={handleChange} onKeyDown={handleKeyDown}
            onCompositionStart={() => { composing.current = true; }}
            onCompositionEnd={e => { composing.current = false; onChange(e.target.value); }}
            placeholder={placeholder} id={`field_${name}`}
            className={INPUT_CLS + " resize-y min-h-[88px]"}/>
          {showMacro && filtered.length > 0 && (
            <div className="macro-dropdown" style={{ top: (textareaRef.current?.offsetHeight || 0) + 4 + 'px', left: 0 }}>
              <div className="px-3 py-2 text-[10px] font-bold text-white/40 tracking-wider border-b border-white/10 flex items-center gap-2">
                <span className="bg-blue-500/20 text-blue-300 px-1.5 py-0.5 rounded text-[9px]">#</span>
                매크로 선택 — ↑↓ 이동, Enter 선택, Esc 닫기
              </div>
              {filtered.map((item, i) => (
                <div key={i} className={`macro-dropdown-item ${i === activeIdx ? 'active' : ''}`}
                  onMouseDown={e => { e.preventDefault(); insertMacro(item); }}>
                  {item}
                </div>
              ))}
            </div>
          )}
          {macros && macros.length > 0 && !showMacro && (
            <div className="text-[10px] text-white/25 mt-1 flex items-center gap-1">
              <span className="bg-white/[.08] text-white/40 px-1 py-0.5 rounded text-[9px] font-mono">#</span>
              매크로 삽입
            </div>
          )}
        </div>
      );
    }

    /* ─── Top-level FormField (IME-safe input) ─── */
    function FormField({ label, value, onChange, placeholder }) {
      const composing = useRef(false);
      const [local, setLocal] = useState(value);
      // Sync parent → local when value changes externally
      useEffect(() => { if (!composing.current) setLocal(value); }, [value]);
      return (
        <label className="grid gap-1.5">
          <span className="text-[11px] font-semibold text-white/55 tracking-wide">{label}</span>
          <input value={local}
            onChange={e => { setLocal(e.target.value); if (!composing.current) onChange(e.target.value); }}
            onCompositionStart={() => { composing.current = true; }}
            onCompositionEnd={e => { composing.current = false; onChange(e.target.value); }}
            placeholder={placeholder} className={INPUT_CLS}/>
        </label>
      );
    }

    /* ─── Top-level FormTextArea (wraps SmartTextarea) ─── */
    function FormTextArea({ label, name, value, onChange, placeholder, macros }) {
      return (
        <label className="grid gap-1.5">
          <span className="text-[11px] font-semibold text-white/55 tracking-wide">{label}</span>
          <SmartTextarea value={value} onChange={onChange} placeholder={placeholder}
            name={name} macros={macros}/>
        </label>
      );
    }

    /* ─── ImageUpload: reusable file→dataURL uploader ─── */
    const FILE_CLS = "bg-white/[.08] border border-white/[.15] rounded-xl px-3.5 py-2 text-sm text-white/60 file:mr-3 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-500/20 file:text-blue-300 hover:file:bg-blue-500/30";

    function ImageUpload({ label, value, onChange, hint }) {
      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file || !file.type.startsWith('image/')) { onChange(''); return; }
        const reader = new FileReader();
        reader.onload = () => onChange(reader.result || '');
        reader.readAsDataURL(file);
      };
      return (
        <label className="grid gap-1.5">
          <span className="text-[11px] font-semibold text-white/55 tracking-wide">{label}</span>
          <div className="flex items-center gap-3">
            <input type="file" accept="image/*" onChange={handleFile} className={FILE_CLS + " flex-1"}/>
            {value && <img src={value} alt="" className="w-10 h-10 rounded-lg object-contain border border-white/10"/>}
          </div>
          {hint && <span className="text-[10px] text-white/25">{hint}</span>}
        </label>
      );
    }

    /* ─── CompanySection: 회사정보 with JSON file save/load ─── */
    function CompanySection({ company, onCompanyChange, logoUrl, onLogoChange, stampUrl, onStampChange }) {
      const setC = useCallback((k, v) => onCompanyChange(prev => ({ ...prev, [k]: v })), [onCompanyChange]);

      const handleSaveJSON = () => {
        const out = { ...company, logoUrl, stampUrl };
        downloadJSON(out, 'company.json');
      };
      const handleLoadJSON = async () => {
        const parsed = await uploadJSON('.json');
        if (!parsed) return;
        onCompanyChange(prev => ({ ...prev, ...parsed }));
        if (parsed.logoUrl) onLogoChange(parsed.logoUrl);
        if (parsed.stampUrl) onStampChange(parsed.stampUrl);
      };

      return (
        <div className="border border-white/[.10] rounded-xl overflow-hidden">
          <div className="px-4 py-2.5 bg-white/[.04] border-b border-white/[.08] flex items-center justify-between">
            <span className="text-[12px] font-bold text-white/60 tracking-wide">회사정보 (공급자)</span>
            <div className="flex gap-1.5">
              <button onClick={handleSaveJSON} className="text-[10px] px-2.5 py-1 rounded-lg bg-emerald-500/15 border border-emerald-400/30 hover:bg-emerald-500/25 text-emerald-300/80 transition">JSON 저장</button>
              <button onClick={handleLoadJSON} className="text-[10px] px-2.5 py-1 rounded-lg bg-violet-500/15 border border-violet-400/30 hover:bg-violet-500/25 text-violet-300/80 transition">JSON 불러오기</button>
            </div>
          </div>
          <div className="p-4 grid gap-3">
            <div className="grid grid-cols-2 gap-3">
              <FormField label="공급자(상호명)" value={company.companyName || ''} onChange={v => setC('companyName', v)} placeholder="예) 0원누수"/>
              <FormField label="등록번호" value={company.registrationNumber || ''} onChange={v => setC('registrationNumber', v)} placeholder="예) 858-18-02343"/>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <FormField label="대표자" value={company.representative || ''} onChange={v => setC('representative', v)} placeholder="예) 홍길동"/>
              <FormField label="연락처" value={company.phone || ''} onChange={v => setC('phone', v)} placeholder="예) 1555-6482"/>
            </div>
            <FormField label="주소" value={company.companyAddress || ''} onChange={v => setC('companyAddress', v)} placeholder="예) 부산광역시 해운대구 ..."/>
            <FormField label="업태/종목" value={company.businessType || ''} onChange={v => setC('businessType', v)} placeholder="예) 건설업 / 배관 및 냉·난방 공사업"/>
            <div className="grid grid-cols-2 gap-3">
              <ImageUpload label="로고 이미지" value={logoUrl} onChange={onLogoChange} hint="회사 로고 (선택)"/>
              <ImageUpload label="직인 이미지" value={stampUrl} onChange={onStampChange} hint="직인/도장 이미지 (선택)"/>
            </div>
          </div>
        </div>
      );
    }

    /* ─── InputForm (uses top-level sub-components → no focus loss) ─── */
    /* ─── MacroManager: 매크로 편집 UI ─── */
    const MACRO_LABELS = { leakCause: '누수원인', workItems: '공사 항목', detailFinding: '상세 소견' };

    function MacroManager({ macros, onMacrosChange }) {
      const [open, setOpen] = useState(false);
      const [editCat, setEditCat] = useState('leakCause');
      const [editIdx, setEditIdx] = useState(-1);
      const [editVal, setEditVal] = useState('');
      const [addVal, setAddVal] = useState('');

      const cats = Object.keys(MACRO_LABELS);
      const list = macros[editCat] || [];

      const save = (cat, arr) => {
        const updated = { ...macros, [cat]: arr };
        onMacrosChange(updated);
      };

      const handleAdd = () => {
        if (!addVal.trim()) return;
        save(editCat, [...list, addVal.trim()]);
        setAddVal('');
      };

      const handleDelete = (idx) => {
        save(editCat, list.filter((_, i) => i !== idx));
        setEditIdx(-1);
      };

      const handleEditSave = () => {
        if (editIdx < 0 || !editVal.trim()) return;
        const arr = [...list];
        arr[editIdx] = editVal.trim();
        save(editCat, arr);
        setEditIdx(-1);
        setEditVal('');
      };

      const handleReset = () => {
        if (!confirm(`"${MACRO_LABELS[editCat]}" 매크로를 기본값으로 초기화할까요?`)) return;
        save(editCat, [...DEFAULT_MACROS[editCat]]);
      };

      return (
        <div className="border border-white/[.10] rounded-xl overflow-hidden">
          <button onClick={() => setOpen(!open)}
            className="w-full px-4 py-2.5 bg-white/[.04] border-b border-white/[.08] flex items-center justify-between hover:bg-white/[.06] transition">
            <span className="text-[12px] font-bold text-white/60 tracking-wide">매크로 관리</span>
            <span className="text-[10px] text-white/30">{open ? '▲ 접기' : '▼ 펼치기'}</span>
          </button>
          {open && (
            <div className="p-4">
              <div className="flex gap-1.5 mb-3">
                {cats.map(cat => (
                  <button key={cat} onClick={() => { setEditCat(cat); setEditIdx(-1); }}
                    className={`text-[11px] px-3 py-1.5 rounded-lg border transition ${editCat === cat ? 'bg-blue-500/20 border-blue-400/40 text-blue-300' : 'bg-white/[.04] border-white/[.10] text-white/50 hover:bg-white/[.08]'}`}>
                    {MACRO_LABELS[cat]}
                    <span className="ml-1 text-[9px] opacity-60">({(macros[cat] || []).length})</span>
                  </button>
                ))}
              </div>

              <div className="space-y-1.5 mb-3 max-h-48 overflow-y-auto">
                {list.map((item, idx) => (
                  <div key={idx} className="flex items-center gap-2 group">
                    {editIdx === idx ? (
                      <>
                        <input value={editVal} onChange={e => setEditVal(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter') handleEditSave(); if (e.key === 'Escape') setEditIdx(-1); }}
                          className="flex-1 bg-white/[.10] border border-blue-400/40 rounded-lg px-3 py-1.5 text-xs text-white/90 outline-none" autoFocus/>
                        <button onClick={handleEditSave} className="text-[10px] px-2 py-1 rounded-lg bg-emerald-500/20 text-emerald-300 border border-emerald-400/30">확인</button>
                        <button onClick={() => setEditIdx(-1)} className="text-[10px] px-2 py-1 rounded-lg bg-white/[.06] text-white/40 border border-white/10">취소</button>
                      </>
                    ) : (
                      <>
                        <span className="flex-1 text-xs text-white/70 truncate">{item}</span>
                        <button onClick={() => { setEditIdx(idx); setEditVal(item); }}
                          className="opacity-0 group-hover:opacity-100 text-[10px] px-2 py-0.5 rounded bg-white/[.06] text-white/40 hover:text-white/70 transition">수정</button>
                        <button onClick={() => handleDelete(idx)}
                          className="opacity-0 group-hover:opacity-100 text-[10px] px-2 py-0.5 rounded bg-red-500/10 text-red-400/60 hover:text-red-400 transition">삭제</button>
                      </>
                    )}
                  </div>
                ))}
                {list.length === 0 && <div className="text-[11px] text-white/25 text-center py-3">매크로가 없습니다</div>}
              </div>

              <div className="flex gap-2">
                <input value={addVal} onChange={e => setAddVal(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
                  placeholder="새 매크로 입력 후 Enter 또는 추가 클릭"
                  className="flex-1 bg-white/[.06] border border-white/[.12] rounded-lg px-3 py-1.5 text-xs text-white/80 placeholder:text-white/25 outline-none focus:border-blue-400/40"/>
                <button onClick={handleAdd} className="text-[10px] px-3 py-1.5 rounded-lg bg-blue-500/20 border border-blue-400/30 text-blue-300 hover:bg-blue-500/30 transition">추가</button>
                <button onClick={handleReset} className="text-[10px] px-3 py-1.5 rounded-lg bg-orange-500/15 border border-orange-400/30 text-orange-300/70 hover:bg-orange-500/25 transition">초기화</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ─── TemplateManager (Supabase + localStorage fallback) ─── */
    function TemplateManager({ data, onApply }) {
      const [templates, setTemplates] = useState([]);
      const [showList, setShowList] = useState(false);
      const dropRef = useRef(null);

      const reload = async () => {
        if (sb) {
          const list = await dbTemplates.list();
          setTemplates(list);
        } else {
          setTemplates(loadJSON(STORAGE_TEMPLATES, []));
        }
      };

      useEffect(() => { reload(); }, []);

      useEffect(() => {
        const handler = (e) => { if (dropRef.current && !dropRef.current.contains(e.target)) setShowList(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const handleSave = async () => {
        const name = prompt('템플릿 이름을 입력하세요:');
        if (!name || !name.trim()) return;
        if (sb) {
          await dbTemplates.save(name.trim(), { ...data });
          await reload();
        } else {
          const tpl = { id: Date.now(), name: name.trim(), savedAt: new Date().toISOString(), data: { ...data } };
          const updated = [...templates, tpl];
          setTemplates(updated);
          saveJSON(STORAGE_TEMPLATES, updated);
        }
      };

      const handleDelete = async (id) => {
        if (!confirm('이 템플릿을 삭제할까요?')) return;
        if (sb) { await dbTemplates.remove(id); await reload(); }
        else {
          const updated = templates.filter(t => t.id !== id);
          setTemplates(updated);
          saveJSON(STORAGE_TEMPLATES, updated);
        }
      };

      const handleApply = (tpl) => { onApply(tpl.data); setShowList(false); };

      return (
        <div className="relative" ref={dropRef}>
          <button onClick={() => { reload(); setShowList(!showList); }}
            className="px-3 py-2 rounded-xl text-xs font-semibold bg-violet-500/20 border border-violet-400/50 hover:bg-violet-500/30 transition flex items-center gap-1">
            템플릿
            <span className="bg-white/10 rounded-full px-1.5 text-[10px]">{templates.length}</span>
          </button>
          {showList && (
            <div className="absolute right-0 top-full mt-2 w-80 bg-[#141d30] border border-white/15 rounded-2xl shadow-2xl shadow-black/50 z-50 overflow-hidden">
              <div className="px-4 py-3 border-b border-white/10 flex justify-between items-center">
                <span className="text-xs font-bold text-white/70">템플릿</span>
                <button onClick={handleSave} className="text-[10px] px-2.5 py-1 rounded-lg bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-400/30 text-emerald-300 transition">현재 내용 저장</button>
              </div>
              {templates.length === 0 ? (
                <div className="px-4 py-6 text-center text-xs text-white/30">저장된 템플릿이 없습니다</div>
              ) : (
                <div className="max-h-60 overflow-y-auto">
                  {templates.map(tpl => (
                    <div key={tpl.id} className="flex items-center justify-between px-4 py-2.5 hover:bg-white/[.05] border-b border-white/[.05] transition group">
                      <button onClick={() => handleApply(tpl)} className="flex-1 text-left">
                        <div className="text-sm font-medium text-white/85">{tpl.name}</div>
                        <div className="text-[10px] text-white/30 mt-0.5">{new Date(tpl.createdAt || tpl.savedAt).toLocaleString('ko')}</div>
                      </button>
                      <button onClick={() => handleDelete(tpl.id)}
                        className="opacity-0 group-hover:opacity-100 text-red-400/70 hover:text-red-400 text-xs px-2 py-1 rounded-lg transition">삭제</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ─── DocumentList: saved documents panel ─── */
    function DocumentList({ currentDocId, onLoad, onNew }) {
      const [docs, setDocs] = useState([]);
      const [show, setShow] = useState(false);
      const dropRef = useRef(null);

      const reload = async () => {
        if (sb) setDocs(await dbDocs.list());
      };
      useEffect(() => { reload(); }, []);
      useEffect(() => {
        const handler = (e) => { if (dropRef.current && !dropRef.current.contains(e.target)) setShow(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const handleLoad = async (id) => {
        const doc = await dbDocs.load(id);
        if (doc) { onLoad(doc); setShow(false); }
      };
      const handleDelete = async (id) => {
        if (!confirm('이 문서를 삭제할까요?')) return;
        await dbDocs.remove(id);
        if (id === currentDocId) onNew();
        await reload();
      };

      if (!sb) return null;

      return (
        <div className="relative" ref={dropRef}>
          <button onClick={() => { reload(); setShow(!show); }}
            className="px-3 py-2 rounded-xl text-xs font-semibold bg-cyan-500/20 border border-cyan-400/50 hover:bg-cyan-500/30 transition flex items-center gap-1">
            문서 목록
            <span className="bg-white/10 rounded-full px-1.5 text-[10px]">{docs.length}</span>
          </button>
          {show && (
            <div className="absolute right-0 top-full mt-2 w-96 bg-[#141d30] border border-white/15 rounded-2xl shadow-2xl shadow-black/50 z-50 overflow-hidden">
              <div className="px-4 py-3 border-b border-white/10 flex justify-between items-center">
                <span className="text-xs font-bold text-white/70">저장된 소견서</span>
                <button onClick={() => { onNew(); setShow(false); }} className="text-[10px] px-2.5 py-1 rounded-lg bg-blue-500/20 hover:bg-blue-500/30 border border-blue-400/30 text-blue-300 transition">+ 새 문서</button>
              </div>
              {docs.length === 0 ? (
                <div className="px-4 py-6 text-center text-xs text-white/30">저장된 문서가 없습니다</div>
              ) : (
                <div className="max-h-72 overflow-y-auto">
                  {docs.map(doc => (
                    <div key={doc.id} className={`flex items-center justify-between px-4 py-2.5 border-b border-white/[.05] transition group ${doc.id === currentDocId ? 'bg-blue-500/10' : 'hover:bg-white/[.05]'}`}>
                      <button onClick={() => handleLoad(doc.id)} className="flex-1 text-left">
                        <div className="text-sm font-medium text-white/85">{doc.title || doc.siteAddress || '제목 없음'}</div>
                        <div className="text-[10px] text-white/30 mt-0.5">
                          {[doc.managerName, doc.visitDate, doc.siteAddress].filter(Boolean).join(' · ') || '정보 없음'}
                        </div>
                        <div className="text-[9px] text-white/20 mt-0.5">{new Date(doc.updatedAt).toLocaleString('ko')}</div>
                      </button>
                      <button onClick={() => handleDelete(doc.id)}
                        className="opacity-0 group-hover:opacity-100 text-red-400/70 hover:text-red-400 text-xs px-2 py-1 rounded-lg transition">삭제</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ─── App ─── */
    function App() {
      const [data, setData] = useState(() => loadJSON(STORAGE_DATA, { ...EMPTY }));
      const [docId, setDocId] = useState(null);
      const [company, setCompany] = useState(() => loadJSON(STORAGE_COMPANY, { ...EMPTY_COMPANY }));
      const [logoUrl, setLogoUrl] = useState(() => localStorage.getItem(STORAGE_LOGO) || '');
      const [stampUrl, setStampUrl] = useState(() => localStorage.getItem(STORAGE_STAMP) || '');
      const [scale, setScale] = useState(() => Number(localStorage.getItem(STORAGE_SCALE)) || 65);
      const [macros, setMacros] = useState(() => loadJSON(STORAGE_MACROS, { ...DEFAULT_MACROS }));
      const [saving, setSaving] = useState(false);

      // On mount: load company from Supabase (or fallback to JSON file)
      useEffect(() => {
        (async () => {
          if (sb) {
            const c = await dbCompany.load();
            if (c) {
              setCompany(c);
              if (c.logoUrl) setLogoUrl(c.logoUrl);
              if (c.stampUrl) setStampUrl(c.stampUrl);
            }
          } else {
            const isEmptyCompany = !company.companyName && !company.representative;
            if (isEmptyCompany) {
              const json = await fetchJSON('company.json', null);
              if (json && (json.companyName || json.representative)) {
                setCompany(prev => ({ ...prev, ...json }));
                if (json.logoUrl) setLogoUrl(json.logoUrl);
                if (json.stampUrl) setStampUrl(json.stampUrl);
              }
            }
          }
        })();
      }, []);

      // Auto-save to localStorage always
      useEffect(() => { saveJSON(STORAGE_DATA, data); }, [data]);
      useEffect(() => { saveJSON(STORAGE_COMPANY, company); }, [company]);
      useEffect(() => { localStorage.setItem(STORAGE_LOGO, logoUrl); }, [logoUrl]);
      useEffect(() => { localStorage.setItem(STORAGE_STAMP, stampUrl); }, [stampUrl]);
      useEffect(() => { localStorage.setItem(STORAGE_SCALE, String(scale)); }, [scale]);
      useEffect(() => { saveJSON(STORAGE_MACROS, macros); }, [macros]);

      // Save company to Supabase with debounce
      const companyTimer = useRef(null);
      useEffect(() => {
        if (!sb) return;
        if (companyTimer.current) clearTimeout(companyTimer.current);
        companyTimer.current = setTimeout(() => {
          dbCompany.save({ ...company, logoUrl, stampUrl });
        }, 2000);
        return () => clearTimeout(companyTimer.current);
      }, [company, logoUrl, stampUrl]);

      // Save document to Supabase
      const handleSaveDoc = async () => {
        if (!sb) return;
        setSaving(true);
        const today = new Date().toISOString().slice(0, 10);
        const datePart = data.visitDate || today;
        const namePart = data.siteAddress || data.managerName || '소견서';
        const title = `${datePart} ${namePart}`;
        const newId = await dbDocs.save(docId, { ...data, title });
        if (newId && !docId) setDocId(newId);
        setSaving(false);
      };

      // Load document from list
      const handleLoadDoc = (doc) => {
        const { id, updatedAt, createdAt, created_at, updated_at, ...rest } = doc;
        setData({ ...EMPTY, ...rest });
        setDocId(id);
      };

      // New document
      const handleNewDoc = () => {
        setData({ ...EMPTY });
        setDocId(null);
      };

      const handlePrint = () => window.print();

      const handleReset = () => {
        if (!confirm('소견 내용을 초기화할까요?')) return;
        setData({ ...EMPTY });
        setDocId(null);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-[#0a0f1a] via-[#0c1222] to-[#0e1630]">
          {/* Header */}
          <header className="no-print sticky top-0 z-30 backdrop-blur-xl bg-[#0c1222]/80 border-b border-white/10 shadow-lg shadow-black/20">
            <div className="max-w-[1440px] mx-auto px-5 py-3 flex items-center justify-between gap-4">
              <div>
                <h1 className="text-[15px] font-bold tracking-tight">누수 기술 소견서</h1>
                <p className="text-[11px] text-white/40">
                  {sb ? '☁️ Supabase 연결됨' : '💾 로컬 모드'} · # 매크로 · 인쇄(PDF)
                </p>
              </div>
              <div className="flex items-center gap-2 flex-wrap justify-end">
                <div className="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white/[.06] border border-white/[.12] text-[11px] text-white/50 font-mono">
                  <span>배율</span>
                  <input type="range" min="40" max="100" value={scale} onChange={e => setScale(Number(e.target.value))} className="w-20 accent-blue-400"/>
                  <span className="w-8 text-right">{scale}%</span>
                </div>
                <DocumentList currentDocId={docId} onLoad={handleLoadDoc} onNew={handleNewDoc}/>
                <TemplateManager data={data} onApply={(d) => { setData({ ...EMPTY, ...d }); setDocId(null); }}/>
                {sb && (
                  <button onClick={handleSaveDoc} disabled={saving}
                    className="px-3 py-2 rounded-xl text-xs font-semibold bg-emerald-500/20 border border-emerald-400/50 hover:bg-emerald-500/30 transition disabled:opacity-50">
                    {saving ? '저장 중...' : docId ? '☁️ 저장' : '☁️ 새로 저장'}
                  </button>
                )}
                <button onClick={handlePrint}
                  className="px-4 py-2 rounded-xl text-xs font-semibold bg-blue-500/20 border border-blue-400/50 hover:bg-blue-500/30 transition">인쇄 / PDF</button>
                <button onClick={handleReset}
                  className="px-3 py-2 rounded-xl text-xs font-semibold bg-red-500/15 border border-red-400/40 hover:bg-red-500/25 transition">초기화</button>
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="max-w-[1440px] mx-auto p-5">
            <div className="grid gap-5" style={{ gridTemplateColumns: '1.3fr 1fr' }}>
              {/* Left: Input */}
              <div className="no-print bg-white/[.05] border border-white/[.12] rounded-2xl shadow-2xl shadow-black/30 overflow-hidden">
                <div className="px-5 py-3.5 border-b border-white/[.10] bg-white/[.03] flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <h2 className="text-[13px] font-bold tracking-wide">입력</h2>
                    {docId && <span className="text-[9px] text-cyan-400/60 bg-cyan-400/10 px-2 py-0.5 rounded-full">ID: {docId.slice(0,8)}</span>}
                  </div>
                  <span className="text-[10px] text-emerald-400/70 font-medium">{sb ? '☁️ 클라우드' : '💾 로컬'} 저장</span>
                </div>
                <div className="p-5 overflow-y-auto" style={{ maxHeight: 'calc(100vh - 140px)' }}>
                  <InputForm data={data} onChange={setData}
                    company={company} onCompanyChange={setCompany}
                    logoUrl={logoUrl} onLogoChange={setLogoUrl}
                    stampUrl={stampUrl} onStampChange={setStampUrl}
                    macros={macros} onMacrosChange={setMacros}/>
                </div>
              </div>

              {/* Right: Preview */}
              <div className="preview-card-outer bg-white/[.03] border border-white/[.10] rounded-2xl shadow-2xl shadow-black/30 overflow-hidden flex flex-col">
                <div className="no-print px-5 py-3.5 border-b border-white/[.10] bg-white/[.03] flex items-baseline justify-between">
                  <h2 className="text-[13px] font-bold tracking-wide text-white/50">A4 미리보기</h2>
                  <span className="text-[10px] font-mono text-white/30">인쇄 시 원본 크기</span>
                </div>
                <div className="flex-1 overflow-auto p-4 flex justify-center" style={{ background: 'radial-gradient(circle at 50% 30%, rgba(255,255,255,.03), transparent 70%)' }}>
                  <div className="preview-scaler" style={{ transform: `scale(${scale / 100})`, transformOrigin: 'top center', width: 794, flexShrink: 0 }}>
                    <div className="shadow-2xl rounded-xl overflow-hidden" style={{ border: '1px solid rgba(200,200,200,.15)' }}>
                      <DocumentPage data={data} company={company} logoUrl={logoUrl} stampUrl={stampUrl}/>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
